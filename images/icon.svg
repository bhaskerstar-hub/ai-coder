<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background — no rounded corners, no gaps -->
  <rect width="256" height="256" fill="url(#bg2)"/>
  <!-- Terminal window top bar -->
  <circle cx="52" cy="52" r="8" fill="#ef4444" opacity="0.85"/>
  <circle cx="76" cy="52" r="8" fill="#eab308" opacity="0.85"/>
  <circle cx="100" cy="52" r="8" fill="#22c55e" opacity="0.85"/>
  <!-- Terminal prompt text lines -->
  <rect x="52" y="92" width="72" height="6" rx="3" fill="white" opacity="0.3"/>
  <rect x="52" y="108" width="48" height="6" rx="3" fill="white" opacity="0.2"/>
  <!-- Terminal cursor block -->
  <rect x="52" y="140" width="36" height="52" rx="6" fill="#38bdf8"/>
  <!-- Lightning bolt / spark -->
  <path d="M136 56 L112 120 L144 112 L116 192" stroke="#facc15" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Spark dots -->
  <circle cx="156" cy="72" r="5" fill="#facc15" opacity="0.7"/>
  <circle cx="172" cy="96" r="4" fill="#facc15" opacity="0.5"/>
  <circle cx="100" cy="80" r="4" fill="#38bdf8" opacity="0.6"/>
  <circle cx="180" cy="140" r="3" fill="#facc15" opacity="0.4"/>
</svg>
